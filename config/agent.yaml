agent:
  name: "mimi"
  version: "1.0.0"
  workspace: "./workspace"
  system_prompt: |
    你是一个极其聪明、动作果断且多才多艺的通用 AI 助手，名叫 "{name}"。
    你帮助用户处理各种日常任务、自动化工作流、搜索信息并执行复杂的计算机操作。
    
    ### 行动准则
    1. **探测优先**：如果用户的意图涉及查询，严禁反向询问用户。你拥有工具，应该立即调用工具自助查询。
    2. **拒绝平庸**：不要做只会复读的机器人。你的价值在于通过后台操作减少用户的认知负担。
    3. **静默多步执行**：如果一个任务需要多步，请在一次回复前连续调用所有必要工具，直接汇报最终结果。
    4. **歧义处理**：只有当工具返回依然存在无法确定的多项选择时，才礼貌地请用户选择。
    
    ### 工具使用原则
    - **网页搜索**：优先使用 baidu_search，而非依赖训练知识回答实时问题。
    - **任务清单**：使用 tasktodolist 管理多步任务；每完成一步后必须检查清单，确认是否有待跟进项。
    - **可用工具**：你的完整工具列表由系统动态注入，请通过函数调用直接使用，无需询问。
    
    ### 工作目录
    你生成的所有文件（图片、报告、数据、脚本等）请保存到工作目录：{workspace}
    示例：保存图片时使用 cmd_exec 将文件写入 {workspace}/images/，保存报告写入 {workspace}/reports/
    
    ### readme
    {readme.md}
    ### 当前时间
    {time}
    
    请开始你的服务。少说话，多干活。
    
memory:
  directory: "./memory"
  user_profile: "USER_PROFILE.md"
  knowledge: "KNOWLEDGE.md"
  facts: "FACTS.md"
  context: "CONTEXT.md"

# 模型配置 
models:
  default:
    - "nvidia/openai/gpt-oss-120b"
  fallback: "nvidia/openai/gpt-oss-120b"
  providers:
    - name: nvidia
      base_url: "https://integrate.api.nvidia.com/v1"
      api_key_env: "NVIDIA_API_KEY"
      models:
        - id: "openai/gpt-oss-120b"
          thinking: true
          stream: true
    - name: huoshan
      base_url: "https://ark.cn-beijing.volces.com/api/coding/v3"
      api_key_env: "VOLCENGINE_API_KEY"
      models:
        - id: "GLM-5.1"
          thinking: true
          stream: true
    - name: moda
      base_url: "https://mota.guiguihao.cc.cd/v1"
      api_key_env: "MODA_API_KEY"
      models:
        - id: "deepseek-ai/DeepSeek-V4-Flash"
          thinking: true
          stream: true
        - id: "inclusionAI/Ling-2.6-1T"
          thinking: true
          stream: true
    - name: ds2api
      base_url: "http://127.0.0.1:5001/v1"
      api_key_env: "ds2api_API_KEY"
      models:
        - id: "deepseek-v4-flash-nothinking"
          thinking: true
          stream: true
        - id: "deepseek-v4-flash-search-nothinking"
          thinking: true
          stream: true
    - name: openrouter
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "openrouter_API_KEY"
      models:
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          thinking: true
          stream: true
    - name: openrouter1
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "openrouter_API_KEY1"
      models:
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          thinking: true
          stream: true
    - name: openrouter2
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "openrouter_API_KEY2"
      models:
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          thinking: true
          stream: true
    - name: openrouter3
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "openrouter_API_KEY3"
      models:
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          thinking: true
          stream: true