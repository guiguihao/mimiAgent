    # - name: "系统健康"
    #   prompt: "系统自检：所有设备和服务是否正常？"
      
    # - name: "环境优化"
    #   prompt: "根据当前时间和环境数据，是否需要调节设备？"
      
    # - name: "安全巡检"
    #   prompt: "安全检查：门窗、烟雾、燃气等是否正常？"

    - name: "环境检查" #这个不要删 实用
      interval: "*/15 * * * *"  # 每5分钟
      prompt: "查询杭州的天气，检查当前智能设备状态数据，并使用 memory_update_environment 更新环境状态记忆。"

